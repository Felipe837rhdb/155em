<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>155 HUB - Gerador de Key</title>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: #111; padding: 40px; border-radius: 15px; border: 2px solid #ff0000; width: 90%; max-width: 400px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); }
        h1 { color: #ff0000; margin-bottom: 5px; }
        .key-box { background: #1a1a1a; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 1.2rem; border: 1px dashed #555; margin: 20px 0; color: #ff0000; font-weight: bold; }
        .copy-btn { background: #ff0000; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .copy-btn:hover { background: #cc0000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>155 HUB VIP</h1>
        <p>Sua chave expira em 24h.</p>
        <div class="key-box" id="keyDisplay">CARREGANDO...</div>
        <button class="copy-btn" onclick="copyKey()">COPIAR KEY</button>
    </div>
    <script>
        function generateKey() {
            const now = new Date();
            const day = String(now.getUTCDate()).padStart(2, '0');
            const month = String(now.getUTCMonth() + 1).padStart(2, '0');
            const year = now.getUTCFullYear();
            return "155_KEY_" + day + month + year;
        }
        document.getElementById('keyDisplay').innerText = generateKey();
        function copyKey() {
            navigator.clipboard.writeText(document.getElementById('keyDisplay').innerText);
            alert("Key copiada!");
        }
    </script>
</body>
</html>
